<script type="application/json" id="speaker-notes">
[
  "Good morning. I'd like you to hold two images in your head for a second. In one, an institutional trader in Mumbai has a Bloomberg terminal on their desk. It costs roughly thirty-two thousand dollars a year. In the other, a retail investor is checking a WhatsApp group for the next hot tip before putting real money to work. That gap, between institutional intelligence and WhatsApp, is the problem we set out to solve. This is AlphaStream India.",
  "Let me size the gap. There are over fifteen crore demat accounts in this country as of March 2024, per CDSL and NSDL data. Around eighty percent of those investors rely on informal tips rather than structured data. Active traders waste two to three hours every day hunting across disconnected platforms, which is roughly two lakh nineteen thousand rupees of lost productivity per user per year. And the obvious fix, just ask ChatGPT, is actively dangerous. Generic chatbots answer from static training weights, they hallucinate prices, and they miss real-time earnings. You don't want that anywhere near your capital.",
  "So our answer is not another chatbot. It is a live AI paradigm. Look at every row of this table: data freshness, reasoning, how numbers come out, evidence, history. On the left is what every competitor will show you, a single LLM call over stale data. On the right is what AlphaStream actually does. Streaming ingestion under two seconds. Thirteen agents fused into one Alpha Score. SQL on DuckDB for every number, so we are deterministic. Source citations on every claim. And five years of backtested history on every pattern. This is a signal-finder with explainability, not a summarizer.",
  "Here is how it's built, in five layers. Layer one is ingestion, NSE, BSE, NSDL for FII and DII flows, Groww, yfinance, and global macro. Layer two is Pathway, our streaming engine, which does incremental embedding and indexing, no full rebuilds. Layer three is the thirteen-agent reasoning swarm on Gemini 2.0 Flash with Adaptive RAG. Layer four is our analytics layer, DuckDB for OLAP, ChromaDB for vectors, and our Text2SQL pipeline. Layer five is the React terminal you'll see in a moment, streaming over WebSocket. End to end, from a news article hitting our ingestion to the UI updating, is under two seconds.",
  "Now, enough talking. The best way to see what this means is to watch it run. I'm going to move through five things: Overview, Signals, Global Intel, our natural language chat, and then the money shot, a live sentiment shift, where I inject a breaking news event and you watch the recommendation change on screen in under two seconds, with no page refresh. Switching to the live system now.",
  "Welcome back. Three things that a wrapper simply cannot copy. First: sub-two-second latency. Second: our Adaptive RAG. We start retrieving only two documents, and double only when the model signals insufficient context. That geometric pattern saves us about forty percent on token cost compared to fixed retrieval. Third: our NLQ pipeline is an eight-node LangGraph: guardrail, route, generate SQL, execute on DuckDB, narrate, with a correction loop that catches execution errors and retries. That's why our numerics are zero-hallucination.",
  "A word on how the thirteen agents combine, because judges always ask. No single agent dictates the output. Corporate filings get a weight of zero-point-two-five. Technical trend signals, zero-point-two-five. Insider and FII flow clusters, zero-point-two-zero. News sentiment, zero-point-one-five. The backtest agent, zero-point-one-five. The Decision Agent fuses those signals into one Alpha Score between zero and one hundred. That weighted design is deliberate. It prevents any single model from taking the system into a bad call.",
  "What does that mean for the user? Two lakh nineteen thousand rupees per user per year in recovered productivity. We compress two hours of research into fifteen minutes. On top of that, two to three actionable signals a month with sixty percent historical accuracy and a three thousand rupee average gain gives roughly fifty-four thousand rupees in alpha per user per year. And on risk: portfolio-aware alerts tied to FII and DII streaks meaningfully reduce behavioral panic selling.",
  "For ET Markets, here is the trajectory. Year one: fifty thousand users, fifty-nine point nine crore in annual revenue. Year three: two lakh users, two hundred and thirty-nine point eight crore. Year five: five lakh users, five hundred and ninety-nine point four crore. That's on a nine hundred and ninety-nine rupee per month premium tier, targeting a serviceable obtainable market of one and a half lakh premium users. On top of that, automating high-frequency signal generation takes thirty percent off manual analyst workload, call it five to ten crore a year in operational savings.",
  "To close. Everything you just saw is at github.com/wildcraft958/AlphaStream_India. Built by Team NamoFans: Animesh Raj, Devansh Gupta, and Monika Kumari. We've shown a live-streaming, multi-agent, source-cited terminal that executes Problem Statement Six end to end. We're open for an architectural teardown. Thank you.",
  "This is what we call the Herd of Knowledge. Fourteen connectors across four categories, all running in parallel via Python's concurrent futures thread pool. Five news sources: NewsAPI for breaking stories, Finnhub for company-specific news, Alpha Vantage for sentiment-tagged articles, MediaStack for global coverage, and an always-on RSS fallback across ten feeds. Three market data connectors: NSE via yfinance with the .NS suffix, BSE for corporate filings, and Groww with JWT plus TOTP authentication for live fundamentals. Three institutional connectors pulling NSDL FII/DII flows, NSE SAST/PIT insider trades, and BSE bulk and block deals. Three global intelligence connectors: a global market connector for VIX, crypto, FX, and commodities via yfinance, a macro connector hitting thirty-plus FRED series including yield curve and credit spreads, and a geopolitical connector that tracks four hotspots relevant to Indian market risk. All fourteen feed into a single Pathway ConnectorSubject which deduplicates by title hash, chunks to four hundred tokens, embeds incrementally, and indexes without a full rebuild.",
  "Our NLQ agent is not a simple prompt-to-text pipeline. It is an eight-node LangGraph state machine. Every query first passes through an input guardrail that rejects off-topic requests and scrubs PII. The enrichment node runs a cyclic web search via DuckDuckGo in up to three rounds, and loads persistent session context from an in-memory store so follow-up questions have continuity. The router then classifies intent into one of eight categories. For standard intents like signal queries or FII flow lookups, we execute a pre-defined SQL view directly, which is instant. For ad-hoc natural language queries, we run the full Text2SQL pipeline: schema linker maps tokens to DuckDB columns, the query planner selects the right tables and aggregation strategy, the SQL generator produces a query, and the guardrails check for injection risk and row-limit violations. DuckDB executes with a thirty-second timeout and a five-thousand-row cap. If execution fails, the validate-and-correct node extracts the error, feeds it back to the LLM, and retries up to three times. The narrate node then converts the tabular result into a markdown narrative with citations. The output guardrail redacts technical names. Three FastMCP servers extend the agent with structured tools: market data, signals, and search. Every answer is grounded in live DuckDB data, never LLM training weights.",
  "This animation shows how all thirteen agents contribute to the Alpha Score. On the left is the Market Analysis cluster: Sentiment, Technical, Risk, Pattern, Backtest, and Flow. On the right is the Data Intelligence cluster: Filing, Insider, Anomaly, Search, Chart, and Report. At the center is the Decision Agent, which receives all outputs and runs a weighted fusion. Filing and Technical signals each carry a weight of zero-point-two-five because they are the most structured and verifiable. Insider plus FII/DII flow combined carry zero-point-two-zero. News sentiment carries zero-point-one-five because it is noisy. The backtest agent carries zero-point-one-five and prevents the system from acting on patterns with poor historical win rates. The Decision Agent normalizes each score to a zero-to-one hundred range, applies the weights, and maps the result to a direction: Strong Buy at eighty or above, Buy at sixty, Hold at forty, Sell at twenty, Strong Sell below twenty. The NLQ agent shown at the bottom is independent: it uses DuckDB queries, not the agent fusion, and is only wired to Decision for global context injection.",
  "This is the full system architecture verified against the actual backend source code. Not the version from the submission document, which referenced Kafka and Redpanda — those were never in our stack. The real ingestion uses fifteen connectors across the five categories you see here. Layer two is Pathway with official xpacks: the AdaptiveRAGQuestionAnswerer with geometric retrieval starting at two documents, the UsearchKnnFactory for cosine similarity search, and filesystem persistence for UDF caching. Layer three is thirteen parallel agents on Gemini 2.0 Flash via LangChain. Layer four is DuckDB for OLAP with a star schema, ChromaDB for vector storage, the LangGraph NLQ pipeline, and three FastMCP servers. Layer five is FastAPI with sixty-plus endpoints, WebSocket for streaming, and the React nineteen Bloomberg terminal.",
  "This is the DuckDB star schema. Ten fact tables and six pre-aggregated views. The fact tables cover every data type in the system: prices, signals, insider trades, FII/DII flows, corporate filings, bulk deals, quarterly results, raw articles with threat classification, and a general insights table for ambient alerts. The six views are what the NLQ agent queries first for standard intents. The signal summary view gives the latest seven days of signals sorted by alpha score. The insider activity view joins trades to company and sector. The FII/DII trend view uses window functions for five-day and twenty-day rolling sums, which is how the flow agent detects institutional streaks. The sector heatmap aggregates signal counts and average alpha by sector. The screener view joins each ticker's latest price to its latest signal in a single query. All queries run in-process via the DuckDB Python library, so there is no network round trip to a database server.",
  "Our anomaly detection module runs online machine learning — meaning the models update on every incoming price tick without any batch retraining cycle. We use the River library for this. Three detectors run in parallel per ticker. Half-Space Trees detect price anomalies using an online random forest structure. When the anomaly score for a given tick exceeds zero-point-seven, the agent raises a directional alert. The Z-score rolling detector tracks intraday volume and fires when a tick exceeds two-point-five standard deviations from the rolling mean. ADWIN, which stands for Adaptive Windowing, detects sentiment drift: when the running average sentiment score for a ticker shifts by more than the adaptive threshold, it signals a drift event. These three detectors together give us real-time early warning on price, volume, and sentiment simultaneously, without any scheduled batch job."
]
