<script type="application/json" id="speaker-notes">
[
  "Good morning. I'd like you to hold two images in your head for a second. In one, an institutional trader in Mumbai has a Bloomberg terminal on their desk. It costs roughly thirty-two thousand dollars a year. In the other, a retail investor is checking a WhatsApp group for the next hot tip before putting real money to work. That gap, between institutional intelligence and WhatsApp, is the problem we set out to solve. This is AlphaStream India.",
  "Let me size the gap. There are over fifteen crore demat accounts in this country as of March 2024, per CDSL and NSDL data. Around eighty percent of those investors rely on informal tips rather than structured data. Active traders waste two to three hours every day hunting across disconnected platforms, which is roughly two lakh nineteen thousand rupees of lost productivity per user per year. And the obvious fix, just ask ChatGPT, is actively dangerous. Generic chatbots answer from static training weights, they hallucinate prices, and they miss real-time earnings. You don't want that anywhere near your capital.",
  "So our answer is not another chatbot. It is a live AI paradigm. Look at every row of this table: data freshness, reasoning, how numbers come out, evidence, history. On the left is what every competitor will show you, a single LLM call over stale data. On the right is what AlphaStream actually does. Streaming ingestion under two seconds. Thirteen agents fused into one Alpha Score. SQL on DuckDB for every number, so we are deterministic. Source citations on every claim. And five years of backtested history on every pattern. This is a signal-finder with explainability, not a summarizer.",
  "Here is how it's built, in five layers. Layer one is ingestion, NSE, BSE, NSDL for FII and DII flows, Groww, yfinance, and global macro. Layer two is Pathway, our streaming engine, which does incremental embedding and indexing, no full rebuilds. Layer three is the thirteen-agent reasoning swarm on Gemini 2.0 Flash with Adaptive RAG. Layer four is our analytics layer, DuckDB for OLAP, ChromaDB for vectors, and our Text2SQL pipeline. Layer five is the React terminal you'll see in a moment, streaming over WebSocket. End to end, from a news article hitting our ingestion to the UI updating, is under two seconds.",
  "Now, enough talking. The best way to see what this means is to watch it run. I'm going to move through five things: Overview, Signals, Global Intel, our natural language chat, and then the money shot, a live sentiment shift, where I inject a breaking news event and you watch the recommendation change on screen in under two seconds, with no page refresh. Switching to the live system now.",
  "Welcome back. Three things that a wrapper simply cannot copy. First: sub-two-second latency. Second: our Adaptive RAG. We start retrieving only two documents, and double only when the model signals insufficient context. That geometric pattern saves us about forty percent on token cost compared to fixed retrieval. Third: our NLQ pipeline is an eight-node LangGraph: guardrail, route, generate SQL, execute on DuckDB, narrate, with a correction loop that catches execution errors and retries. That's why our numerics are zero-hallucination.",
  "A word on how the thirteen agents combine, because judges always ask. No single agent dictates the output. Corporate filings get a weight of zero-point-two-five. Technical trend signals, zero-point-two-five. Insider and FII flow clusters, zero-point-two-zero. News sentiment, zero-point-one-five. The backtest agent, zero-point-one-five. The Decision Agent fuses those signals into one Alpha Score between zero and one hundred. That weighted design is deliberate. It prevents any single model from taking the system into a bad call.",
  "What does that mean for the user? Two lakh nineteen thousand rupees per user per year in recovered productivity. We compress two hours of research into fifteen minutes. On top of that, two to three actionable signals a month with sixty percent historical accuracy and a three thousand rupee average gain gives roughly fifty-four thousand rupees in alpha per user per year. And on risk: portfolio-aware alerts tied to FII and DII streaks meaningfully reduce behavioral panic selling.",
  "For ET Markets, here is the trajectory. Year one: fifty thousand users, fifty-nine point nine crore in annual revenue. Year three: two lakh users, two hundred and thirty-nine point eight crore. Year five: five lakh users, five hundred and ninety-nine point four crore. That's on a nine hundred and ninety-nine rupee per month premium tier, targeting a serviceable obtainable market of one and a half lakh premium users. On top of that, automating high-frequency signal generation takes thirty percent off manual analyst workload, call it five to ten crore a year in operational savings.",
  "To close. Everything you just saw is at github.com/wildcraft958/AlphaStream_India. Built by Team NamoFans: Animesh, Devansh, and Monika. We've shown a live-streaming, multi-agent, source-cited terminal that executes Problem Statement Six end to end. We're open for an architectural teardown. Thank you."
]
