<script type="application/json" id="speaker-notes">
[
  "Good morning. Hold two pictures in your head. One: an institutional trader in Mumbai with a Bloomberg terminal on their desk. That terminal costs around thirty-two thousand dollars a year. Two: a retail investor checking a WhatsApp group for the next hot tip before putting real money to work. The gap between those two pictures, institutional intelligence on one side and WhatsApp on the other, is the gap we set out to close. This is AlphaStream India.",
  "Let me size the gap. India has crossed twenty-one crore demat accounts as of October twenty twenty-five, per NSDL and CDSL data. Of those, four and a half crore are active traders. Eighty percent of them rely on tips, not data. The average active trader spends two to three hours a day hunting across disconnected screens, which is roughly two lakh nineteen thousand rupees of lost productivity per user per year. And the obvious shortcut, just ask ChatGPT, is actively dangerous. Generic chatbots answer from frozen training weights, they hallucinate prices, and they miss earnings announced an hour ago. You don't want that anywhere near your capital.",
  "So our answer is not another chatbot. It is a live AI paradigm. Five rows: data freshness, reasoning, how numbers come out, evidence, history. On the left is what every competitor will show you, a single LLM call over stale data. On the right is what AlphaStream actually does. Streaming ingestion under two seconds. Thirteen agents fused into one Alpha Score. SQL on DuckDB for every number so we are deterministic, not probabilistic. Source citations on every claim. And five years of backtested history on every pattern. This is a signal-finder with explainability, not a summariser.",
  "Five layers, end to end. Layer one is ingestion: NSE, BSE, NSDL for FII and DII flows, Groww, yfinance, and global macro from FRED. Layer two is Pathway, our streaming engine. Incremental embedding and indexing, no full rebuilds. Layer three is the thirteen-agent reasoning swarm on Gemini 2.0 Flash with Adaptive RAG. Layer four is analytics: DuckDB for OLAP, ChromaDB for vectors, and our Text2SQL pipeline. Layer five is the React terminal streaming over WebSocket. End to end, from a news article hitting our ingestion to the UI updating, is under two seconds.",
  "Now let me show you what feeds Layer 1. We call this the Herd of Knowledge. Fourteen connectors across four categories, all running in parallel. News intelligence: five sources, NewsAPI, Finnhub, Alpha Vantage, MediaStack, and RSS feeds across ten outlets. Market data: three sources, NSE for OHLCV, BSE for filings, Groww with JWT plus TOTP authentication. Institutional: three sources, NSDL FII/DII, NSE SAST/PIT insider, BSE corporate announcements. Global intelligence: three sources, WorldMonitor for VIX/crypto/FX, FRED for thirty-plus macro series, and a geopolitical hotspot classifier. All fourteen feed into a single Pathway ConnectorSubject. Deduplicated, chunked, embedded, indexed, all incrementally.",
  "Enough talking. The best way to see what this means is to watch it run. I'm going to move through five things: Overview, Signals, Global Intel, our natural language chat, and the money shot, a live sentiment shift where I inject a breaking news event and you watch the recommendation change on screen in under two seconds, no page refresh. Switching to the live system now.",
  "Welcome back. Three things a wrapper cannot copy. First: sub-two-second latency. Pathway streams a news article from ingestion to the React UI in under two seconds. Second: Adaptive RAG. We start retrieving only two documents, and double only when the model signals insufficient context. That geometric pattern saves about forty percent on token cost compared to fixed retrieval. Third: our NLQ pipeline. An eight-node LangGraph with guardrails, routing, SQL generation, DuckDB execution, narration, and a correction loop. And one more thing: Perplexity Finance is free for Indian users, but it doesn't have NSE SAST/PIT or NSDL FII/DII feeds. India-specific regulatory data is not in any global API. That is a regulatory moat, not a price moat.",
  "Let me deep-dive on the NLQ agent. This is not a prompt-to-text wrapper. Every query enters an input guardrail that rejects off-topic and scrubs PII. The enrich node runs cyclic web search and loads session memory. The router classifies intent. For standard intents like signal queries or FII flow lookups, we execute a pre-defined SQL view directly, which is instant. For ad-hoc questions, the Text2SQL pipeline runs: schema linker, query planner, SQL generator, guardrails. DuckDB executes with a thirty-second timeout and a five-thousand-row cap. If execution fails, the validate-and-correct node feeds the error back to the LLM and retries up to three times. The narrate node converts the result into a markdown answer with citations. Output guardrail redacts technical names. Three FastMCP servers extend the agent with structured tools.",
  "A word on how the thirteen agents combine, because judges always ask. No single agent dictates the output. Five buckets, weighted: corporate filings twenty-five percent, technical signals twenty-five percent, insider plus FII flow twenty percent, news sentiment fifteen percent, backtest agent fifteen percent. The Decision Agent fuses these into a single Alpha Score from zero to one hundred. Above eighty is Strong Buy, sixty to eighty is Buy, forty to sixty is Hold. The weighted design is deliberate. It prevents any single model from taking the system into a bad call.",
  "Here is the actual map. Two columns of specialists. Market Analysis on the left: Sentiment, Technical, Risk, Pattern, Backtest, Flow. Data Intelligence on the right: Filing, Insider, Anomaly, Search, Chart, Report. All thirteen feed into the Decision Agent in the centre. The Decision Agent applies the weights and outputs one number, the Alpha Score, plus a direction and reasoning. The NLQ agent at the bottom is independent. It uses DuckDB queries, not the agent fusion.",
  "What does this mean for the user? Time: two lakh nineteen thousand rupees per user per year in recovered productivity. We compress two hours of research into fifteen minutes. Alpha: two to three actionable signals a month, sixty percent historical accuracy, three thousand rupees average gain, roughly fifty-four thousand rupees of extra alpha per user per year. Risk: portfolio-aware alerts tied to FII and DII streaks reduce behavioural panic selling, an estimated fifteen percent reduction in behavioural losses.",
  "For ET Markets, the trajectory. Year one: fifty thousand premium users, fifty-nine point nine crore. Year three: two lakh users, two hundred and thirty-nine point eight crore. Year five: five lakh users, five hundred and ninety-nine point four crore. Pricing is nine hundred and ninety-nine rupees a month. For comparison, Tickertape, a single-tier screener at five thousand rupees a year, already does one hundred and fourteen crore in annual revenue. We are real-time at twelve thousand a year, targeting half their userbase. Our serviceable obtainable market is one and a half lakh paying users, half a percent of India's four and a half crore active traders. Conservative. On top of subscription, automating high-frequency signal generation takes thirty percent off ET Markets' manual analyst workload, another five to ten crore a year in operational savings.",
  "Open this slide during Q&A if asked about architecture. This is the full system architecture verified line-by-line against the actual backend source. Five layers, fifteen connectors, thirteen agents, ten DuckDB tables, sixty-plus FastAPI endpoints, end-to-end latency under two seconds.",
  "Open this slide if asked about the database. Ten fact tables, six pre-aggregated views, star schema. The views are what the NLQ agent queries first for standard intents, sub-hundred-millisecond response on common questions.",
  "Open this slide if asked about real-time alerts. Three online detectors per ticker, all using the River library. Half-Space Trees for price anomalies, threshold zero-point-seven. Z-score for volume spikes, two-point-five standard deviations. ADWIN for sentiment drift. Online means models update on every tick. No batch retraining.",
  "All numbers in this deck are verified. Twenty-one crore demat accounts: NSDL and CDSL October twenty twenty-five. Tickertape one hundred and fourteen crore revenue: Tracxn FY twenty-five filing. Bloomberg thirty-two thousand dollars per year: PricingNow February twenty-six. Perplexity Finance pricing: their public docs. Every numeric in this deck has a source.",
  "To close. Everything you just saw is at github.com/wildcraft958/AlphaStream_India. Built by Team NamoFans: Animesh Raj, Devansh Gupta, and Monika Kumari. A live-streaming, multi-agent, source-cited terminal end to end for Problem Statement Six. We're open for an architectural teardown. Thank you."
]
